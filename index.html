<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speaking App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>🎤 Speaking App</h2>

  <div class="controls">
    <input id="topic" placeholder="Topic (travel, job...)" />
    <button id="startBtn" onclick="start()">Start Speaking</button>
  </div>

  <div class="composer">
    <textarea id="draftInput" rows="3" placeholder="Your message will appear here. Edit it before sending..."></textarea>
    <div class="composerActions">
      <button id="sendBtn" onclick="sendCurrentDraft()">Send</button>
      <button id="clearBtn" type="button" onclick="clearDraft()">Clear</button>
    </div>
  </div>

  <div id="chatLog"></div>
  <p id="status"></p>

  <script>
    const chatLogEl = document.getElementById("chatLog");
    const draftInput = document.getElementById("draftInput");
    const sendBtn = document.getElementById("sendBtn");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const conversation = [];

    if (!SpeechRecognition) {
      statusEl.innerText = "❌ Your browser does not support Speech Recognition. Please use Chrome.";
      startBtn.disabled = true;
      throw new Error("SpeechRecognition is not supported");
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      speechSynthesis.speak(utterance);
    }

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message ${role === "You" ? "user" : "ai"}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = `${role}: ${text}`;

      const replayBtn = document.createElement("button");
      replayBtn.type = "button";
      replayBtn.className = "replayBtn";
      replayBtn.title = "Nghe lại cách phát âm";
      replayBtn.innerText = "🔊";
      replayBtn.onclick = () => speak(text);

      if (role === "You") {
        row.appendChild(bubble);
        row.appendChild(replayBtn);
      } else {
        row.appendChild(replayBtn);
        row.appendChild(bubble);
      }

      chatLogEl.appendChild(row);
      chatLogEl.scrollTop = chatLogEl.scrollHeight;
    }

    function start() {
      statusEl.innerText = "🎧 Listening...";
      startBtn.disabled = true;
      
      console.log("Start button clicked");
      console.log("navigator.mediaDevices:", navigator.mediaDevices);
      
      // Try to request microphone permission first (Android)
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then((stream) => {
            console.log("Mic permission granted");
            // Stop the stream - we only needed permission
            stream.getTracks().forEach(track => track.stop());
            recognition.start();
          })
          .catch((error) => {
            console.log("getUserMedia error:", error.name, error.message);
            statusEl.innerText = "❌ " + error.name + ": " + error.message;
            startBtn.disabled = false;
          });
      } else {
        console.log("mediaDevices not available, trying direct start");
        // Fallback: try direct recognition.start() on older browsers
        recognition.start();
      }
    }

    function clearDraft() {
      draftInput.value = "";
      draftInput.focus();
      statusEl.innerText = "";
    }

    async function sendCurrentDraft() {
      const text = draftInput.value.trim();

      if (!text) {
        statusEl.innerText = "❌ Please enter or dictate a message first.";
        return;
      }

      appendMessage("You", text);
      conversation.push({ role: "user", content: text });
      draftInput.value = "";
      statusEl.innerText = "⏳ Thinking...";
      sendBtn.disabled = true;

      const topic = document.getElementById("topic").value || "daily life";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            topic,
            text,
            history: conversation.slice(-12)
          })
        });

        const data = await res.json();

        if (!res.ok) {
          data.reply = "token limit exceeded. Please try again.";
        }

        appendMessage("AI", data.reply);
        conversation.push({ role: "assistant", content: data.reply });
        statusEl.innerText = "✅ Done";

        speak(data.reply);
      } catch (error) {
        statusEl.innerText = "❌ " + error.message;
      } finally {
        sendBtn.disabled = false;
      }
    }

    recognition.onend = function() {
      startBtn.disabled = false;
    };

    recognition.onerror = function(event) {
      let errorMsg = event.error;
      
      if (event.error === "not-allowed") {
        errorMsg = "Permission denied. Please allow microphone access in your browser settings.";
      } else if (event.error === "network") {
        errorMsg = "Network error. Check your internet connection.";
      } else if (event.error === "no-speech") {
        errorMsg = "No speech detected. Please try again.";
      }
      
      statusEl.innerText = "❌ Mic error: " + errorMsg;
      startBtn.disabled = false;
    };

    recognition.onresult = function(event) {
      const text = event.results[0][0].transcript;
      draftInput.value = text;
      draftInput.focus();
      draftInput.select();
      statusEl.innerText = "✏️ Edit the text if needed, then press Send.";
    };

    draftInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendCurrentDraft();
      }
    });
  </script>
</body>
</html>
