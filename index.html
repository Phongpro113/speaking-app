<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speaking App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>🎤 Speaking App</h2>

  <div class="controls">
    <input id="topic" placeholder="Topic (travel, job...)" />
    <button id="startBtn" onclick="start()">Start Speaking</button>
  </div>

  <div class="composer">
    <textarea id="draftInput" rows="3" placeholder="Your x message will appear here. Edit it before sending..."></textarea>
    <div class="composerActions">
      <button id="sendBtn" onclick="sendCurrentDraft()">Send</button>
      <button id="clearBtn" type="button" onclick="clearDraft()">Clear</button>
    </div>
  </div>

  <div id="chatLog"></div>
  <p id="status"></p>

  <script>
    const chatLogEl = document.getElementById("chatLog");
    const draftInput = document.getElementById("draftInput");
    const sendBtn = document.getElementById("sendBtn");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const conversation = [];

    if (!SpeechRecognition) {
      statusEl.innerText = "❌ Your browser does not support Speech Recognition. Please use Chrome.";
      startBtn.disabled = true;
      throw new Error("SpeechRecognition is not supported");
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    async function speak(text) {
      try {
        const res = await fetch("/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error("TTS failed");
        const blob = await res.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play();
      } catch (err) {
        console.error("Fish Audio TTS error:", err);
        // fallback về browser TTS nếu lỗi
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        speechSynthesis.speak(utterance);
      }
    }

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message ${role === "You" ? "user" : "ai"}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = `${role}: ${text}`;

      const replayBtn = document.createElement("button");
      replayBtn.type = "button";
      replayBtn.className = "replayBtn";
      replayBtn.title = "Nghe lại cách phát âm";
      replayBtn.innerText = "🔊";
      replayBtn.onclick = () => speak(text);

      if (role === "You") {
        row.appendChild(bubble);
        row.appendChild(replayBtn);
      } else {
        row.appendChild(replayBtn);
        row.appendChild(bubble);
      }

      chatLogEl.appendChild(row);
      chatLogEl.scrollTop = chatLogEl.scrollHeight;
    }

    function start() {
      statusEl.innerText = "🎧 Listening...";
      startBtn.disabled = true;
      
      console.log("Start clicked, mediaDevices available:", !!navigator.mediaDevices);
      
      // Detect if on Android
      const isAndroid = /Android/.test(navigator.userAgent);
      console.log("Is Android:", isAndroid);
      
      // Try requesting microphone permission
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then((stream) => {
            console.log("Permission granted");
            stream.getTracks().forEach(track => track.stop());
            recognition.start();
          })
          .catch((error) => {
            console.log("getUserMedia error:", error.name, error.message);
            if (error.name === "NotAllowedError") {
              statusEl.innerText = "❌ Permission denied. Please allow microphone.";
            } else {
              statusEl.innerText = "❌ " + error.message;
            }
            startBtn.disabled = false;
          });
      } else {
        // Fallback for browsers without getUserMedia
        console.log("Fallback: using recognition.start() directly");
        
        // On Android, may need to guide user to settings
        if (isAndroid) {
          statusEl.innerText = "📱 Android detected. If mic permission is denied, go to Settings > Apps > [Browser] > Permissions > Microphone and enable it.";
        }
        
        recognition.start();
      }
    }

    function clearDraft() {
      draftInput.value = "";
      draftInput.focus();
      statusEl.innerText = "";
    }

    async function sendCurrentDraft() {
      const text = draftInput.value.trim();

      if (!text) {
        statusEl.innerText = "❌ Please enter or dictate a message first.";
        return;
      }

      appendMessage("You", text);
      conversation.push({ role: "user", content: text });
      draftInput.value = "";
      statusEl.innerText = "⏳ Thinking...";
      sendBtn.disabled = true;

      const topic = document.getElementById("topic").value || "daily life";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            topic,
            text,
            history: conversation.slice(-12)
          })
        });

        const data = await res.json();

        if (!res.ok) {
          data.reply = "token limit exceeded. Please try again.";
        }

        appendMessage("AI", data.reply);
        conversation.push({ role: "assistant", content: data.reply });
        statusEl.innerText = "✅ Done";

        speak(data.reply);
      } catch (error) {
        statusEl.innerText = "❌ " + error.message;
      } finally {
        sendBtn.disabled = false;
      }
    }

    recognition.onend = function() {
      console.log("Recognition ended");
      startBtn.disabled = false;
    };

    recognition.onerror = function(event) {
      console.log("Recognition error:", event.error);
      let errorMsg = event.error;
      
      if (event.error === "not-allowed") {
        errorMsg = "Microphone permission denied.";
        // Add retry button for "not-allowed" error
        statusEl.innerHTML = `❌ ${errorMsg} <button onclick="location.reload()" style="margin-left: 10px;">Refresh & Try Again</button>`;
      } else if (event.error === "network") {
        errorMsg = "Network error. Check your internet connection.";
        statusEl.innerText = "❌ " + errorMsg;
      } else if (event.error === "no-speech") {
        errorMsg = "No speech detected. Please try again.";
        statusEl.innerText = "❌ " + errorMsg;
      } else {
        errorMsg = event.error;
        statusEl.innerText = "❌ " + errorMsg;
      }
      
      startBtn.disabled = false;
    };

    recognition.onresult = function(event) {
      console.log("Recognition result:", event.results[0][0].transcript);
      const text = event.results[0][0].transcript;
      draftInput.value = text;
      draftInput.focus();
      draftInput.select();
      statusEl.innerText = "✏️ Edit the text if needed, then press Send.";
    };

    draftInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendCurrentDraft();
      }
    });
  </script>
</body>
</html>
