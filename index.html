<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speaking App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
      background: linear-gradient(180deg, #f7faff 0%, #ffffff 100%);
      color: #1f2937;
    }

    h2 {
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .composer {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    #topic,
    #draftInput {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    #topic {
      flex: 1;
      min-width: 220px;
    }

    #draftInput {
      resize: vertical;
      min-height: 84px;
      line-height: 1.45;
    }

    .composerActions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.98);
    }

    #clearBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #chatLog {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 6px;
    }

    .message {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .bubble {
      padding: 12px 14px;
      border-radius: 16px;
      max-width: min(100%, 620px);
      line-height: 1.45;
      white-space: pre-wrap;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .user {
      justify-content: flex-end;
    }

    .user .bubble {
      background: #dbeafe;
      color: #0f172a;
    }

    .ai .bubble {
      background: #ecfdf5;
      color: #052e16;
    }

    .replayBtn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: #111827;
      color: white;
      flex: 0 0 auto;
    }

    #status {
      margin-top: 14px;
      min-height: 24px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h2>🎤 Speaking App</h2>

  <div class="controls">
    <input id="topic" placeholder="Topic (travel, job...)" />
    <button id="startBtn" onclick="start()">Start Speaking</button>
  </div>

  <div class="composer">
    <textarea id="draftInput" rows="3" placeholder="Your message will appear here. Edit it before sending..."></textarea>
    <div class="composerActions">
      <button id="sendBtn" onclick="sendCurrentDraft()">Send</button>
      <button id="clearBtn" type="button" onclick="clearDraft()">Clear</button>
    </div>
  </div>

  <div id="chatLog"></div>
  <p id="status"></p>

  <script>
    const chatLogEl = document.getElementById("chatLog");
    const draftInput = document.getElementById("draftInput");
    const sendBtn = document.getElementById("sendBtn");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const conversation = [];

    if (!SpeechRecognition) {
      statusEl.innerText = "❌ Your browser does not support Speech Recognition. Please use Chrome.";
      startBtn.disabled = true;
      throw new Error("SpeechRecognition is not supported");
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      speechSynthesis.speak(utterance);
    }

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message ${role === "You" ? "user" : "ai"}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = `${role}: ${text}`;

      const replayBtn = document.createElement("button");
      replayBtn.type = "button";
      replayBtn.className = "replayBtn";
      replayBtn.title = "Nghe lại cách phát âm";
      replayBtn.innerText = "🔊";
      replayBtn.onclick = () => speak(text);

      if (role === "You") {
        row.appendChild(bubble);
        row.appendChild(replayBtn);
      } else {
        row.appendChild(replayBtn);
        row.appendChild(bubble);
      }

      chatLogEl.appendChild(row);
      chatLogEl.scrollTop = chatLogEl.scrollHeight;
    }

    function start() {
      statusEl.innerText = "🎧 Listening...";
      startBtn.disabled = true;
      recognition.start();
    }

    function clearDraft() {
      draftInput.value = "";
      draftInput.focus();
      statusEl.innerText = "";
    }

    async function sendCurrentDraft() {
      const text = draftInput.value.trim();

      if (!text) {
        statusEl.innerText = "❌ Please enter or dictate a message first.";
        return;
      }

      appendMessage("You", text);
      conversation.push({ role: "user", content: text });
      draftInput.value = "";
      statusEl.innerText = "⏳ Thinking...";
      sendBtn.disabled = true;

      const topic = document.getElementById("topic").value || "daily life";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            topic,
            text,
            history: conversation.slice(-12)
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Request failed");
        }

        appendMessage("AI", data.reply);
        conversation.push({ role: "assistant", content: data.reply });
        statusEl.innerText = "✅ Done";

        speak(data.reply);
      } catch (error) {
        statusEl.innerText = "❌ " + error.message;
      } finally {
        sendBtn.disabled = false;
      }
    }

    recognition.onend = function() {
      startBtn.disabled = false;
    };

    recognition.onerror = function(event) {
      statusEl.innerText = "❌ Mic error: " + event.error;
      startBtn.disabled = false;
    };

    recognition.onresult = function(event) {
      const text = event.results[0][0].transcript;
      draftInput.value = text;
      draftInput.focus();
      draftInput.select();
      statusEl.innerText = "✏️ Edit the text if needed, then press Send.";
    };

    draftInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendCurrentDraft();
      }
    });
  </script>
</body>
</html>
